<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Pace · 待机</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ====== :root variables ====== */
    :root {
      --bg-canvas: #04050a;
      --bg-app: #000000;
      --bg-card: #0B0C0F;
      --bg-elev: #14161B;
      --bg-elev-2: #1B1E24;
      --accent: #00E5A8;
      --accent-bright: #29F0BD;
      --accent-deep: #003B2C;
      --accent-deeper: #06281E;
      --accent-dim: rgba(0, 229, 168, 0.12);
      --warn: #FF6B3D;
      --gold: #E5C07B;
      --live: #FF3B30;
      --heart: #FF3B5C;
      --text-1: #FFFFFF;
      --text-2: #9CA0AB;
      --text-3: #5A5E68;
      --text-4: #3A3D44;
      --hairline: #1F2126;
      --hairline-bright: #2A2D33;
      --frame-1: #2A2C30;
      --frame-2: #181A1E;
      --frame-3: #3F4248;
      --ease-out: cubic-bezier(.2, .8, .2, 1);
    }

    * { box-sizing: border-box; }

    /* ====== body reset for iOS WebView (no demo-page chrome) ====== */
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg-app);
      color: var(--text-1);
      font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
    }
    body {
      padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ====== typography utils ====== */
    .mono {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-feature-settings: 'tnum' 1, 'zero' 1, 'ss01' 1;
    }
    .cn {
      font-family: 'Noto Sans SC', 'Inter', -apple-system, sans-serif;
    }
    .text-accent { color: var(--accent); }
    .text-warn { color: var(--warn); }
    .text-gold { color: var(--gold); }

    /* ====== screen-body (overridden for fullscreen iOS) ====== */
    .screen-body {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      padding: 0;
      position: relative;
      overflow: visible;
      background: transparent;
      border: 0;
      border-radius: 0;
    }

    /* ====== brand-strip family ====== */
    .brand-strip {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 4px 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.18em;
      color: var(--text-3);
      text-transform: uppercase;
    }
    .brand-strip .dot { color: var(--accent); }
    .brand-strip .live-bullet {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      display: inline-block;
      vertical-align: middle;
      margin-right: 5px;
    }
    .brand-strip .coach-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(0, 229, 168, 0.08);
      border: 0.5px solid rgba(0, 229, 168, 0.3);
      color: var(--accent);
      letter-spacing: 0.08em;
      font-size: 9px;
      cursor: pointer;
      transition: background 200ms;
    }
    .brand-strip .coach-chip:hover { background: rgba(0, 229, 168, 0.16); }
    .brand-strip .coach-chip .star { font-size: 11px; }
    .brand-strip .coach-chip .cn-text { font-family: 'Noto Sans SC', sans-serif; letter-spacing: 0.12em; }

    /* ====== dial-triad / dial-card family ====== */
    .dial-triad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
    }
    .dial-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 7px 4px 9px;
      border-radius: 12px;
      background: var(--bg-card);
      border: 0.5px solid var(--hairline);
      position: relative;
      transition: border-color 200ms;
    }
    .dial-card:hover { border-color: rgba(0, 229, 168, 0.35); cursor: pointer; }
    .dial-card.warn { border-color: rgba(229, 192, 123, 0.22); background: linear-gradient(180deg, rgba(229,192,123,0.04), rgba(229,192,123,0)); }
    .dial-card.warn:hover { border-color: rgba(229, 192, 123, 0.45); }
    .dial-card.bad { border-color: rgba(255, 107, 61, 0.25); background: linear-gradient(180deg, rgba(255,107,61,0.05), rgba(255,107,61,0)); }
    .dial-card .label {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 9.5px;
      color: var(--text-2);
      letter-spacing: 0.22em;
      margin-top: 5px;
      line-height: 1;
    }
    .dial-card .meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      color: var(--text-3);
      letter-spacing: 0.06em;
      margin-top: 3px;
      line-height: 1;
    }
    .dial-card .meta.up { color: var(--accent); }
    .dial-card .meta.warn-text { color: var(--gold); }
    .dial-card .meta .ico { font-size: 9px; }
    .dial-card .corner-mark {
      position: absolute;
      top: 5px;
      left: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 6.5px;
      letter-spacing: 0.2em;
      color: var(--text-4);
    }

    /* ====== rhythm-card / rhythm-* family ====== */
    .rhythm-card {
      background: var(--bg-card);
      border: 0.5px solid var(--hairline);
      border-radius: 14px;
      padding: 13px 15px 13px;
      position: relative;
    }
    .rhythm-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .rhythm-header .cn {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 10px;
      color: var(--text-3);
      letter-spacing: 0.24em;
    }
    .rhythm-header .mono {
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      color: var(--text-4);
      letter-spacing: 0.22em;
    }
    .rhythm-bars {
      width: 100%;
      height: 102px;
    }
    .rhythm-bars svg {
      width: 100%;
      height: 100%;
    }
    .rhythm-divider {
      height: 0.5px;
      background: var(--hairline);
      margin: 8px 0 8px;
    }
    .rhythm-stats {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }
    .rhythm-stat-main {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    .rhythm-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .rhythm-num-sm {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.01em;
    }
    .rhythm-unit {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-3);
      letter-spacing: 0.04em;
    }
    .rhythm-prefix {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 10px;
      color: var(--text-3);
      letter-spacing: 0.18em;
      margin-right: 2px;
    }
    .rhythm-delta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 3px 9px;
      border-radius: 4px;
    }
    .rhythm-delta.good {
      color: var(--accent);
      background: rgba(0, 229, 168, 0.08);
      border: 0.5px solid rgba(0, 229, 168, 0.25);
    }
    .rhythm-delta.down {
      color: var(--warn);
      background: rgba(255, 107, 61, 0.08);
      border: 0.5px solid rgba(255, 107, 61, 0.25);
    }
    .rhythm-delta.neutral {
      color: var(--text-4);
      background: transparent;
    }
    .rhythm-stats-sub {
      margin-top: 4px;
      font-size: 11px;
      color: var(--text-2);
      font-family: 'Noto Sans SC', sans-serif;
      letter-spacing: 0.04em;
    }

    /* ====== mini-rhythm overrides ====== */
    .mini-rhythm {
      padding: 10px 12px 10px;
      border-radius: 12px;
    }
    .mini-rhythm .rhythm-header {
      margin-bottom: 6px;
    }
    .mini-rhythm .rhythm-header .cn {
      font-size: 8.5px;
      letter-spacing: 0.22em;
    }
    .mini-rhythm .rhythm-header .mono {
      font-size: 7px;
      letter-spacing: 0.2em;
    }

    /* ====== rhythm-streak family ====== */
    .rhythm-streak {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 11px;
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 10px;
      letter-spacing: 0.12em;
      padding: 3px 10px;
      border-radius: 999px;
    }
    .rhythm-streak.good {
      color: var(--accent);
      background: rgba(0, 229, 168, 0.06);
      border: 0.5px solid rgba(0, 229, 168, 0.22);
    }
    .rhythm-streak.warn {
      color: var(--gold);
      background: rgba(229, 192, 123, 0.06);
      border: 0.5px solid rgba(229, 192, 123, 0.25);
    }
    .rhythm-streak.muted {
      color: var(--text-2);
      background: rgba(255, 255, 255, 0.03);
      border: 0.5px solid var(--hairline);
    }
    .rhythm-streak-sep {
      color: var(--text-4);
      margin: 0 3px;
    }

    /* ====== START button v2 family ====== */
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes pulse-ring {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    .start-button {
      width: 100%;
      height: 176px;
      border-radius: 88px;
      position: relative;
      cursor: pointer;
      background:
        radial-gradient(ellipse 110% 90% at 50% 22%, rgba(0, 229, 168, 0.32) 0%, rgba(0, 78, 56, 0.55) 38%, rgba(0, 35, 25, 0.95) 75%, rgba(0, 18, 12, 1) 100%),
        linear-gradient(180deg, #062A20 0%, #001A14 60%, #001008 100%);
      border: 1px solid rgba(0, 229, 168, 0.42);
      box-shadow:
        0 0 64px rgba(0, 229, 168, 0.32),
        0 0 24px rgba(0, 229, 168, 0.18),
        0 12px 28px rgba(0, 18, 12, 0.6),
        inset 0 1.5px 0 rgba(0, 255, 200, 0.4),
        inset 0 -2px 4px rgba(0, 0, 0, 0.7),
        inset 0 0 80px rgba(0, 229, 168, 0.06);
      overflow: hidden;
      transition: transform 200ms var(--ease-out), box-shadow 200ms var(--ease-out);
      isolation: isolate;
    }

    .start-button:hover {
      transform: scale(1.015);
      box-shadow:
        0 0 80px rgba(0, 229, 168, 0.42),
        0 0 32px rgba(0, 229, 168, 0.24),
        0 14px 32px rgba(0, 18, 12, 0.7),
        inset 0 1.5px 0 rgba(0, 255, 200, 0.5),
        inset 0 -2px 4px rgba(0, 0, 0, 0.7),
        inset 0 0 80px rgba(0, 229, 168, 0.08);
    }

    .start-button .reticle {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.5;
    }

    .start-button .scan-arc {
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      background: conic-gradient(
        from 0deg,
        transparent 0deg,
        transparent 290deg,
        rgba(0, 229, 168, 0.0) 295deg,
        rgba(0, 229, 168, 0.6) 335deg,
        rgba(41, 240, 189, 0.95) 358deg,
        transparent 360deg
      );
      -webkit-mask: radial-gradient(circle at center, transparent 50%, black 51%, black 100%);
      mask: radial-gradient(circle at center, transparent 50%, black 51%, black 100%);
      animation: spin-slow 7s linear infinite;
      z-index: 0;
      pointer-events: none;
    }

    .start-button .gloss {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      border-radius: inherit inherit 0 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.07) 0%, transparent 100%);
      pointer-events: none;
      z-index: 2;
      border-radius: 88px 88px 0 0;
    }

    .start-button .content {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .start-button .icon-row {
      display: flex;
      align-items: center;
      gap: 14px;
      color: var(--accent);
    }
    .start-button .play {
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 8px 0 8px 13px;
      border-color: transparent transparent transparent currentColor;
      filter: drop-shadow(0 0 8px rgba(0, 229, 168, 0.6));
    }
    .start-button .label-cn {
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 700;
      font-size: 30px;
      letter-spacing: 0.28em;
      color: var(--accent-bright);
      text-shadow:
        0 0 18px rgba(0, 229, 168, 0.6),
        0 0 36px rgba(0, 229, 168, 0.3);
      padding-left: 0.28em;
      line-height: 1;
    }
    .start-button .label-en {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 9px;
      letter-spacing: 0.5em;
      color: rgba(0, 229, 168, 0.6);
      text-transform: uppercase;
      padding-left: 0.5em;
      margin-top: 4px;
    }

    .start-button .corner {
      position: absolute;
      width: 8px;
      height: 8px;
      border: 1px solid rgba(0, 229, 168, 0.55);
      z-index: 4;
    }
    .corner.tl { top: 14px; left: 28px; border-right: none; border-bottom: none; }
    .corner.tr { top: 14px; right: 28px; border-left: none; border-bottom: none; }
    .corner.bl { bottom: 14px; left: 28px; border-right: none; border-top: none; }
    .corner.br { bottom: 14px; right: 28px; border-left: none; border-top: none; }

    /* ====== START button compact variant ====== */
    .start-button--compact {
      height: 116px;
      border-radius: 58px;
    }
    .start-button--compact .label-cn {
      font-size: 24px;
      letter-spacing: 0.24em;
      padding-left: 0.24em;
    }
    .start-button--compact .label-en {
      font-size: 8px;
      letter-spacing: 0.42em;
      padding-left: 0.42em;
      margin-top: 3px;
    }
    .start-button--compact .corner { width: 7px; height: 7px; }
    .start-button--compact .corner.tl { top: 10px; left: 22px; }
    .start-button--compact .corner.tr { top: 10px; right: 22px; }
    .start-button--compact .corner.bl { bottom: 10px; left: 22px; }
    .start-button--compact .corner.br { bottom: 10px; right: 22px; }
    .start-button--compact .play { border-width: 6px 0 6px 10px; }
    .start-button--compact .icon-row { gap: 11px; }
    .start-button--compact .gloss { border-radius: 58px 58px 0 0; }

    /* ====== additional animations referenced in markup ====== */
    @keyframes pulse-soft {
      0%, 100% { opacity: 0.85; }
      50% { opacity: 0.35; }
    }
    .pulse-soft { animation: pulse-soft 2s ease-in-out infinite; }

    @keyframes glow-breathe {
      0%, 100% {
        text-shadow:
          0 0 22px rgba(0, 229, 168, 0.55),
          0 0 44px rgba(0, 229, 168, 0.3),
          0 0 88px rgba(0, 229, 168, 0.12);
      }
      50% {
        text-shadow:
          0 0 30px rgba(0, 229, 168, 0.72),
          0 0 60px rgba(0, 229, 168, 0.42),
          0 0 110px rgba(0, 229, 168, 0.2);
      }
    }
    .glow-breathe { animation: glow-breathe 4.2s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="screen-body">
    <!-- Brand strip -->
    <div class="brand-strip">
      <div>PACE<span class="dot">.</span></div>
      <div class="coach-chip">
        <span class="star">✦</span>
        <span class="cn-text cn">教练</span>
      </div>
    </div>

    <!-- Greeting -->
    <div class="relative z-10 mt-3">
      <div class="cn" style="font-size: 17px; color: white; font-weight: 500; letter-spacing: 0.04em;">上午好，刘宇</div>
      <div class="mt-1.5 flex items-center gap-1.5" style="font-size: 9px;">
        <span class="cn" style="color: var(--text-2); letter-spacing: 0.16em;">上海 · 晴 · 18°C · 微风 · </span>
        <span class="cn" style="color: var(--accent); letter-spacing: 0.14em;">适合跑步</span>
      </div>
    </div>

    <!-- Hairline -->
    <div class="relative z-10 mt-3" style="height: 0.5px; background: linear-gradient(90deg, transparent, var(--hairline-bright) 30%, var(--hairline-bright) 70%, transparent);"></div>

    <!-- 三联表盘 (compact) -->
    <div class="relative z-10 mt-3">
      <div class="flex items-baseline justify-between mb-2">
        <div class="cn" style="font-size: 9.5px; color: var(--text-3); letter-spacing: 0.32em;">今日体感</div>
        <div class="mono" style="font-size: 7.5px; color: var(--text-4); letter-spacing: 0.22em;">DAILY METRICS</div>
      </div>
      <div class="dial-triad">
        <div class="dial-card">
          <span class="corner-mark">01</span>
          <svg width="58" height="58" viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="26" fill="none" stroke="rgba(0,229,168,0.08)" stroke-width="3"/>
            <circle cx="32" cy="32" r="26" fill="none" stroke="#00E5A8" stroke-width="3" stroke-linecap="round" stroke-dasharray="163.36" stroke-dashoffset="29.4" transform="rotate(-90 32 32)" style="filter: drop-shadow(0 0 4px rgba(0,229,168,0.4));"/>
            <text x="32" y="34" font-family="JetBrains Mono" font-size="16" font-weight="600" fill="white" text-anchor="middle" dominant-baseline="middle">82</text>
          </svg>
          <span class="label cn">状态</span>
        </div>
        <div class="dial-card warn">
          <span class="corner-mark">02</span>
          <svg width="58" height="58" viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="26" fill="none" stroke="rgba(229,192,123,0.08)" stroke-width="3"/>
            <circle cx="32" cy="32" r="26" fill="none" stroke="#E5C07B" stroke-width="3" stroke-linecap="round" stroke-dasharray="163.36" stroke-dashoffset="53" transform="rotate(-90 32 32)" style="filter: drop-shadow(0 0 4px rgba(229,192,123,0.4));"/>
            <text x="32" y="34" font-family="JetBrains Mono" font-size="14" font-weight="600" fill="white" text-anchor="middle" dominant-baseline="middle">14.2</text>
          </svg>
          <span class="label cn">负荷</span>
        </div>
        <div class="dial-card">
          <span class="corner-mark">03</span>
          <svg width="58" height="58" viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="26" fill="none" stroke="rgba(0,229,168,0.08)" stroke-width="3"/>
            <circle cx="32" cy="32" r="26" fill="none" stroke="#00E5A8" stroke-width="3" stroke-linecap="round" stroke-dasharray="163.36" stroke-dashoffset="21" transform="rotate(-90 32 32)" style="filter: drop-shadow(0 0 4px rgba(0,229,168,0.4));"/>
            <text x="32" y="34" font-family="JetBrains Mono" font-size="13" font-weight="600" fill="white" text-anchor="middle" dominant-baseline="middle">87%</text>
          </svg>
          <span class="label cn">睡眠</span>
        </div>
      </div>
    </div>

    <!-- AI suggestion -->
    <div class="flex gap-1.5 mt-2 items-start relative z-10">
      <span class="text-accent flex-shrink-0" style="font-size: 11px;">✦</span>
      <span class="cn" style="font-size: 10.5px; color: var(--text-2); line-height: 1.55;">
        恢复良好但<span style="color: var(--gold);">负荷偏高</span>，建议轻松跑。
      </span>
    </div>

    <!-- ★★★ NEW: Weekly Rhythm card ★★★ -->
    <div class="rhythm-card mini-rhythm relative z-10 mt-3">
      <div class="rhythm-header">
        <span class="cn">本周节奏</span>
        <span class="mono">RHYTHM</span>
      </div>
      <div class="rhythm-bars" style="height: 56px;">
        <svg viewBox="0 0 280 76" preserveAspectRatio="xMidYMid meet">
          <line x1="0" y1="64" x2="280" y2="64" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
          <rect x="6"   y="22" width="28" height="42" rx="2" fill="rgba(0,229,168,0.55)"/>
          <rect x="46"  y="13" width="28" height="51" rx="2" fill="rgba(0,229,168,0.65)"/>
          <rect x="86"  y="58" width="28" height="6"  rx="2" fill="rgba(255,255,255,0.08)"/>
          <rect x="126" y="30" width="28" height="34" rx="2" fill="rgba(0,229,168,0.5)"/>
          <rect x="166" y="22" width="28" height="42" rx="2" fill="rgba(0,229,168,0.55)"/>
          <rect x="206" y="58" width="28" height="6"  rx="2" fill="rgba(255,255,255,0.08)"/>
          <rect x="246" y="14" width="28" height="50" rx="2" fill="#29F0BD" filter="drop-shadow(0 0 4px rgba(41,240,189,0.6))"/>
          <circle cx="260" cy="10" r="2.5" fill="#29F0BD" style="filter: drop-shadow(0 0 5px rgba(41,240,189,0.9));">

          <text x="20"  y="74" font-family="Noto Sans SC" font-size="7" fill="#5A5E68" text-anchor="middle">一</text>
          <text x="60"  y="74" font-family="Noto Sans SC" font-size="7" fill="#5A5E68" text-anchor="middle">二</text>
          <text x="100" y="74" font-family="Noto Sans SC" font-size="7" fill="#3A3D44" text-anchor="middle">三</text>
          <text x="140" y="74" font-family="Noto Sans SC" font-size="7" fill="#5A5E68" text-anchor="middle">四</text>
          <text x="180" y="74" font-family="Noto Sans SC" font-size="7" fill="#5A5E68" text-anchor="middle">五</text>
          <text x="220" y="74" font-family="Noto Sans SC" font-size="7" fill="#3A3D44" text-anchor="middle">六</text>

      <div class="rhythm-stats" style="margin-top: 6px;">
        <div class="rhythm-stat-main">
          <span class="cn rhythm-prefix">本周</span>
          <span class="rhythm-num" style="font-size: 17px;">26.0</span>
          <span class="rhythm-unit">km</span>

        <div class="rhythm-streak good" style="font-size: 9px; padding: 2px 8px;">

    <!-- START button (compact) -->
    <button class="start-button start-button--compact relative z-10 mt-4" style="height: 88px;">
      <div class="scan-arc"></div>
      <div class="gloss"></div>
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>
      <div class="content">
        <div class="icon-row">
          <span class="play"></span>
          <span class="label-cn cn">出 发</span>
        </div>
        <div class="label-en">LET'S GO</div>

    <!-- 14 天 timeline (with traveling comet particle) -->
    <div class="relative z-10" style="margin-top: 10px;">
      <div class="flex justify-between items-center" style="font-size: 8px; color: var(--text-4); letter-spacing: 0.22em; margin-bottom: 4px;">
        <span class="cn" style="letter-spacing: 0.18em;">最近 14 天</span>
        <span class="text-accent">今天</span>
      </div>
      <svg width="100%" height="14" viewBox="0 0 280 14" style="overflow: visible;">
        <defs>
          <path id="timelineCometPath" d="M 6 7 L 274 7" fill="none"/>
          <radialGradient id="timelineCometGlow">
            <stop offset="0%" stop-color="#29F0BD" stop-opacity="0.95"/>
            <stop offset="50%" stop-color="#29F0BD" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#29F0BD" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <!-- 13 history dots: increasing intensity, varying size -->
        <circle cx="6"   cy="7" r="2"   fill="rgba(0,229,168,0.18)"/>
        <circle cx="26"  cy="7" r="2.4" fill="rgba(0,229,168,0.25)"/>
        <circle cx="46"  cy="7" r="2.8" fill="rgba(0,229,168,0.32)"/>
        <circle cx="66"  cy="7" r="2.2" fill="rgba(0,229,168,0.28)"/>
        <circle cx="86"  cy="7" r="2.6" fill="rgba(0,229,168,0.38)"/>
        <circle cx="106" cy="7" r="3.2" fill="rgba(0,229,168,0.45)"/>
        <circle cx="126" cy="7" r="2.8" fill="rgba(0,229,168,0.5)"/>
        <circle cx="146" cy="7" r="2.4" fill="rgba(0,229,168,0.55)"/>
        <circle cx="166" cy="7" r="3.4" fill="rgba(0,229,168,0.65)" filter="drop-shadow(0 0 3px rgba(0,229,168,0.4))"/>
        <circle cx="186" cy="7" r="2.6" fill="rgba(0,229,168,0.7)"/>
        <circle cx="206" cy="7" r="3"   fill="rgba(0,229,168,0.75)" filter="drop-shadow(0 0 3px rgba(0,229,168,0.4))"/>
        <circle cx="226" cy="7" r="2.4" fill="rgba(0,229,168,0.8)"/>
        <circle cx="246" cy="7" r="2.8" fill="rgba(0,229,168,0.85)" filter="drop-shadow(0 0 3px rgba(0,229,168,0.5))"/>

        <!-- Today: hollow ring with accent stroke -->
        <circle cx="274" cy="7" r="5.5" fill="none" stroke="#29F0BD" stroke-width="1.5" filter="drop-shadow(0 0 5px rgba(41,240,189,0.6))"/>

        <!-- Traveling comet (5s loop, glow halo + bright head) -->
        <circle r="6" fill="url(#timelineCometGlow)">
          <animateMotion dur="5s" repeatCount="indefinite" begin="0s">
            <mpath href="#timelineCometPath"/>
          </animateMotion>
        </circle>
        <circle r="2" fill="#29F0BD">
          <animateMotion dur="5s" repeatCount="indefinite" begin="0s">
            <mpath href="#timelineCometPath"/>
          </animateMotion>
        </circle>
        <!-- Trailing particle for comet tail effect -->
        <circle r="1.4" fill="#00E5A8" opacity="0.6">
          <animateMotion dur="5s" repeatCount="indefinite" begin="-0.18s">
            <mpath href="#timelineCometPath"/>
          </animateMotion>
        </circle>
        <circle r="1.0" fill="#00B488" opacity="0.4">
          <animateMotion dur="5s" repeatCount="indefinite" begin="-0.36s">
            <mpath href="#timelineCometPath"/>
          </animateMotion>
        </circle>
      </svg>
    </div>
  </div>

  <!-- Bridge to native -->
  <script>
    // 1) 出发按钮 → 原生
    document.addEventListener('DOMContentLoaded', function () {
      const btn = document.querySelector('.start-button');
      if (btn) {
        btn.addEventListener('click', function () {
          if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.startRun) {
            window.webkit.messageHandlers.startRun.postMessage({});
          }
        });
      }
    });

    // 2) 字体加载就绪 → 原生 fade-in WebView
    // document.fonts.ready 等所有 @font-face 加载完毕；
    // 1500ms 超时兜底 — 国内网络下 Google Fonts 可能极慢/被墙，
    // 此时直接显示, 用 system 字体降级而不是把用户卡在 splash
    (function () {
      function notifyReady() {
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.htmlReady) {
          window.webkit.messageHandlers.htmlReady.postMessage({});
        }
      }
      const fontsReady = (document.fonts && document.fonts.ready)
        ? document.fonts.ready
        : Promise.resolve();
      const timeout = new Promise(function (r) { setTimeout(r, 1500); });
      Promise.race([fontsReady, timeout]).then(notifyReady);
    })();
  </script>
</body>
